# starship.toml — minimal prompt for a pure-black terminal.
#
# Verified against: https://starship.rs/config/
# Reviewed: 2026-05-12

add_newline = false
scan_timeout = 30
command_timeout = 200

format = """
$directory\
$git_branch$git_status\
$nodejs$python$rust$golang\
$cmd_duration\
$line_break\
$character
"""

[character]
success_symbol = "[>](bold #c3f0be)"
error_symbol = "[>](bold #ffb3c6)"
vimcmd_symbol = "[<](bold #b4d0ff)"

[directory]
format = " [$path]($style)[$read_only]($read_only_style) "
home_symbol = "~"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = ".../"
style = "bold #b4d0ff"
read_only = " "
read_only_style = "#ffb3c6"

[git_branch]
symbol = "  "
style = "#f9e2af"
format = "[$symbol$branch]($style) "

[git_status]
format = '([\[](#c0c0cc)$all_status$ahead_behind[\]](#c0c0cc) )'
modified = "[✱${count}](#b4d0ff)"                                # azul claro
staged = "[+${count}](#c3f0be)"                                  # verde claro
untracked = "[?${count}](#fdf0cc)"                               # amarillo claro
ahead = "[⇡${count}](#b4d0ff)"                                   # azul claro
behind = "[⇣${count}](#c0c0cc)"                                  # gris claro (antes #9a9aa6)
conflicted = "[✖${count}](#ffb3c6)"                              # rosa claro
diverged = "[⇕${count}](#ffb3c6)"                                # rosa claro
stashed = ""
deleted = ""
renamed = ""

[cmd_duration]
min_time = 2000
style = "#c0c0cc"               # gris claro (antes #9a9aa6)
show_milliseconds = false
format = "[$duration]($style) "

[nodejs]
symbol = " "
style = "#c3f0be"                       # verde claro (antes #a6e3a1)
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "#fdf0cc"                                           # amarillo claro (antes #f9e2af)
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"
python_binary = ["python3", "python"]

[rust]
symbol = " "
style = "#f9c4a3" # naranja claro (antes #f5a97f)

[golang]
symbol = " "
style = "#b0ecf5" # cyan claro (antes #89dceb)
