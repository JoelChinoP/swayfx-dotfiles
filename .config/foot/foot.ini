[main]
term = foot
shell = zsh
login-shell = no
font = JetBrainsMono Nerd Font:size=11
dpi-aware = yes
pad = 14x10 center
app-id = foot
notify = notify-send -a ${app-id} -i ${app-id} ${title} ${body}

[scrollback]
lines = 5000
multiplier = 3.0

[url]
launch = xdg-open ${url}
osc8-underline = url-mode

[cursor]
style = beam
blink = yes

[mouse]
hide-when-typing = yes

[colors]
alpha = 0.85
alpha-mode = default

foreground = cdd6f4
background = 11111b

regular0 = 45475a
regular1 = f38ba8
regular2 = a6e3a1
regular3 = f9e2af
regular4 = 89b4fa
regular5 = cba6f7
regular6 = 94e2d5
regular7 = bac2de

bright0 = 585b70
bright1 = f38ba8
bright2 = a6e3a1
bright3 = f9e2af
bright4 = 89b4fa
bright5 = cba6f7
bright6 = 94e2d5
bright7 = a6adc8

selection-foreground = cdd6f4
selection-background = 45475a

[csd]
preferred = client
size = 28
hide-when-maximized = no
double-click-to-maximize = yes
border-width = 1
color = ff11111b
font = JetBrainsMono Nerd Font
border-color = fff3e2a7
button-width = 26
button-color = ff11111b
button-minimize-color = ff89b4fa
button-maximize-color = ffa6e3a1
button-close-color = fff38ba8

[key-bindings]
font-increase = Control+equal
font-decrease = Control+minus
font-reset = Control+0
clipboard-copy = Control+Shift+c
clipboard-paste = Control+Shift+v
