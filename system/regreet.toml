# /etc/greetd/regreet.toml
# Verified against: greetd-regreet
# Reviewed: 2026-05-13

[background]
path = "/etc/greetd/wallpaper-login.png"
fit = "Fill"

[GTK]
application_prefer_dark_theme = true
theme_name = "adw-gtk3-dark"
icon_theme_name = "Papirus-Dark"
font_name = "Inter 14"
css_path = "/etc/greetd/regreet.css"

# ReGreet no soporta bloquear la sesión desde config.
# Si solo existe UN archivo .desktop en /usr/share/wayland-sessions/
# (o /usr/share/xsessions/), ReGreet lo preselecciona automáticamente
# y el dropdown queda oculto. Complementar con el CSS para colapsar el widget.
