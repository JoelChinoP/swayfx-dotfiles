# ════════════════════════════════════════════════
#  starship · prompt — Caelestia-inspired
# ════════════════════════════════════════════════

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](surface1) $directory$git_branch$git_status$python$rust$nodejs$cmd_duration
[╰─](surface1)$character """

add_newline = true

[directory]
style            = "bold lavender"
truncation_length = 3
truncation_symbol = "…/"
read_only        = " 󰌾"

[git_branch]
symbol = " "
style  = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style           = "bold yellow"
conflicted      = "⚡"
ahead           = "⇡${count}"
behind          = "⇣${count}"
diverged        = "⇕⇡${ahead_count}⇣${behind_count}"
untracked       = "?${count}"
modified        = "!${count}"
staged          = "+${count}"
deleted         = "✘${count}"

[character]
success_symbol  = "[❯](bold green)"
error_symbol    = "[❯](bold red)"
vimcmd_symbol   = "[❮](bold mauve)"

[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol$version]($style) "

[rust]
symbol = "󱘗 "
style  = "bold peach"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time         = 2000
style            = "bold subtext0"
format           = "[ $duration]($style) "

[battery]
disabled = true

[time]
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

palette = "catppuccin_mocha"
