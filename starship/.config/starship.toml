# starship.toml — minimal prompt for a pure-black terminal.
#
# Verified against: https://starship.rs/config/
# Reviewed: 2026-05-12

add_newline = false
scan_timeout = 30
command_timeout = 200

format = """
$directory\
$git_branch$git_status\
$nodejs$python$rust$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[›](bold #89b4fa)"
error_symbol   = "[›](bold #f38ba8)"
vimcmd_symbol  = "[‹](bold #a6e3a1)"

[directory]
truncation_length      = 3
truncate_to_repo       = true
truncation_symbol      = "…/"
style                  = "bold #e6e6e6"
read_only              = " "
read_only_style        = "#f38ba8"

[git_branch]
symbol = " "
style  = "#9a9aa6"
format = "[$symbol$branch]($style) "

[git_status]
style    = "#f9e2af"
format   = "[$all_status$ahead_behind]($style) "
conflicted = "✖"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
modified   = "✱"
staged     = "[+\\($count\\)](#a6e3a1)"
untracked  = "?"
stashed    = "≡"

[cmd_duration]
min_time           = 2000
style              = "#9a9aa6"
show_milliseconds  = false
format             = "[$duration]($style) "

[nodejs]
symbol = " "
style  = "#a6e3a1"
format = "[$symbol($version )]($style)"

[python]
symbol            = " "
style             = "#f9e2af"
format            = "[$symbol($version )(\\($virtualenv\\) )]($style)"
python_binary     = ["python3", "python"]

[rust]
symbol = " "
style  = "#f5a97f"

[golang]
symbol = " "
style  = "#89dceb"
