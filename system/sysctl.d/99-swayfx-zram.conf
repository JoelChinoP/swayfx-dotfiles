# Verified against: sysctl.d(5)
# Reviewed: 2026-05-12

# Favor compressed in-RAM swap before heavy reclaim. This helps container
# workloads such as Docker without changing the idle desktop footprint.
vm.swappiness = 180

# Disable swap readahead; zram is memory-backed, so clustered reads add
# latency without the usual disk benefit.
vm.page-cluster = 0
