# ════════════════════════════════════════════════
#  ~/.config/environment.d/wayland.conf
#  Variables de entorno persistentes para Sway
# ════════════════════════════════════════════════

# Backend Wayland para Qt, GTK, SDL y Firefox
MOZ_ENABLE_WAYLAND=1
QT_QPA_PLATFORM=wayland
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
GDK_BACKEND=wayland
SDL_VIDEODRIVER=wayland
CLUTTER_BACKEND=wayland

# Desktop session
XDG_CURRENT_DESKTOP=sway
XDG_SESSION_TYPE=wayland
XDG_SESSION_DESKTOP=sway

# AMD iGPU — Ryzen 5 7430U (RDNA 2 integrada)
# Vulkan nativo: mejor rendimiento que GL en wlroots
WLR_RENDERER=vulkan
AMD_VULKAN_ICD=RADV
LIBVA_DRIVER_NAME=radeonsi
VDPAU_DRIVER=radeonsi

# Cursor consistente en todas las apps
XCURSOR_THEME=Bibata-Modern-Classic
XCURSOR_SIZE=24
