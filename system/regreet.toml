# /etc/greetd/regreet.toml
# Verified against: /usr/share/doc/greetd-regreet/regreet.sample.toml (greetd-regreet 0.4.0)
# Reviewed: 2026-06-07

[background]
path = "/etc/greetd/wallpaper-login.png"
fit = "Fill"

[GTK]
application_prefer_dark_theme = true
theme_name = "adw-gtk3-dark"
icon_theme_name = "Papirus-Dark"
font_name = "Inter 14"

# ReGreet 0.4.0 loads CSS through `regreet --style`.
# With no flag, its default stylesheet is /etc/greetd/regreet.css.

[default_session]
command = "sway"
name = "sway"

# Si solo existe UN .desktop en /usr/share/wayland-sessions/ el dropdown
# queda oculto automáticamente. Con default_session se preselecciona siempre.
